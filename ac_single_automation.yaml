blueprint:
  domain: automation
  homeassistant:
    min_version: 2025.7.0
  author: Guilherme C. Leoni (https://github.com/theleoni)
  source_url: https://www.github.com/theleoni/ha-blueprints

  name: "AC with Occupancy State variations"
  description: "Gerencia as ações do Ar Condicionado baseado na ocupação do cômodo e Modo da Casa, suportando validações extras e ajustes externos (ex: controle remoto)."

  #######              INPUT              #######
  input:
    # --- 1. SELETORES PRINCIPAIS ---
    base:
      name: "Seletores Principais"
      collapsed: false
      icon: mdi:tune
      input:
        ac_device:
          name: "Ar Condicionado"
          selector:
            entity:
              domain: climate
        house_mode_entity:
          name: "Entidade do Modo da Casa"
          default: input_select.house_mode
          selector:
            entity:
              domain: input_select
        occupancy_selector:
          name: "Occupancy Seletor do Cômodo"
          selector:
            entity:
              domain: input_select
        is_daylight:
          name: "É dia? (Boolean)"
          default: input_boolean.daylight
          selector:
            entity:
              domain: input_boolean

    # --- 2. GESTÃO DE AUSÊNCIA (VAZIO) ---
    absence_settings:
      name: "Configurações de Ausência (Vazio)"
      description: "Delays aplicados antes de desligar o AC quando o estado efetivo for Vazio."
      collapsed: false
      icon: mdi:account-off
      input:
        day_delay:
          name: "Delay p/ desligar (Dia)"
          default: { hours: 0, minutes: 30, seconds: 0 }
          selector:
            duration:
              enable_day: false
        night_delay:
          name: "Delay p/ desligar (Noite)"
          default: { hours: 0, minutes: 0, seconds: 0 }
          selector:
            duration:
              enable_day: false

    # --- 3. GATILHOS E CONDIÇÕES ADICIONAIS ---
    additional_data:
      name: "Gatilhos e Condições Adicionais"
      description: "Refine o acionamento (ex: janelas devem estar fechadas)."
      collapsed: false
      icon: mdi:filter-plus-outline
      input:
        additional_triggers:
          name: "Gatilhos Adicionais"
          default: []
          selector:
            trigger: {}
        additional_condition:
          name: "Condições Adicionais"
          default: []
          selector:
            condition: {}
        default_action:
          name: "Ação Padrão (Default)"
          description: "Executada caso as Condições Adicionais falharem (ex: janela aberta)."
          default: []
          selector:
            action: {}

    # --- 4. CONFIGURAÇÕES DOS MODOS DO AC ---
    ac_modes_settings:
      name: "Configurações por Modo de Operação"
      description: "Ações executadas quando o AC está ativo no modo respectivo e o cômodo está ocupado."
      collapsed: false
      icon: mdi:air-conditioner
      input:
        ac_state_debounce:
          name: "Debounce de Alteração de Modo"
          description: "Tempo de espera após o AC ser ligado ou alterado para Frio, Ventilar, etc., antes do HA aplicar as ações detalhadas."
          default: { hours: 0, minutes: 0, seconds: 10 }
          selector:
            duration:
              enable_day: false
        cool_action:
          name: "Ação para Modo: Cool (Frio)"
          default: []
          selector:
            action: {}
        fan_action:
          name: "Ação para Modo: Fan (Ventilação)"
          default: []
          selector:
            action: {}
        dry_action:
          name: "Ação para Modo: Dry (Secar)"
          default: []
          selector:
            action: {}
        heat_action:
          name: "Ação para Modo: Heat (Quente)"
          default: []
          selector:
            action: {}

#######         RUNNING CONFIG          #######
mode: queued
max: 2

#######             VARIABLES           #######
variables:
  ac_ent: !input ac_device
  occupancy_selector_var: !input occupancy_selector
  house_mode_entity_var: !input house_mode_entity
  daylight_var: !input is_daylight

  # 1. Captura de Estados
  ac_state: "{{ states(ac_ent) }}"
  current_house_mode: "{{ states(house_mode_entity_var) }}"
  current_occupancy: "{{ states(occupancy_selector_var) }}"
  is_day: "{{ is_state(daylight_var, 'on') }}"

  # 2. Lógica central: "Estado Efetivo"
  effective_state: >
    {% if current_house_mode == 'Ninguém em Casa' %} Vazio
    {% elif current_house_mode == 'Apenas Pets na Casa' %} Pet
    {% elif current_house_mode == 'Não perturbe' %} Não perturbe
    {% elif current_house_mode in ['Férias', 'Faxina', 'Visitas', 'Cinema', 'Dormindo'] %} {{ current_house_mode }}
    {% else %} {{ current_occupancy }} {% endif %}

#######             TRIGGERS            #######
triggers:
  - triggers: !input additional_triggers

  - trigger: state
    entity_id: input_boolean.runallautomation
    to: "on"

  - trigger: state
    entity_id: !input house_mode_entity

  - trigger: state
    entity_id: !input occupancy_selector

  # Gatilho exclusivo para mudanças de Modo do AC (Ignora quando é desligado)
  - trigger: state
    entity_id: !input ac_device
    to:
      - "cool"
      - "fan_only"
      - "dry"
      - "heat"
    for: !input ac_state_debounce

#######            CONDITIONS           #######
conditions:
  - condition: state
    entity_id: input_boolean.stopallautomation
    state: "off"

#######              ACTIONS            #######
actions:
  # 1. Validação das Condições Adicionais (ex: Janelas Fechadas)
  - if:
      - condition: and
        conditions: !input additional_condition
    then:
      - choose:
          # --- CENÁRIO 1: AMBIENTE VAZIO ---
          # (Inclui "Férias" ou qualquer estado que resulte em Vazio)
          - conditions:
              - condition: template
                value_template: "{{ effective_state == 'Vazio' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ is_day }}"
                then:
                  - delay: !input day_delay
                else:
                  - delay: !input night_delay

              # Só envia o comando se o AC ainda estiver ligado após o delay
              - if:
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: !input ac_device
                        state: "off"
                then:
                  - action: climate.turn_off
                    target:
                      entity_id: !input ac_device

          # --- CENÁRIO 2: AMBIENTE OCUPADO E AC LIGADO ---
          # Ignora 'Vazio', 'Pet' e 'Não perturbe'. Para qualquer outro modo, gerencia o AC.
          - conditions:
              - condition: template
                value_template: "{{ effective_state not in ['Vazio', 'Pet', 'Não perturbe'] }}"
              - condition: not
                conditions:
                  - condition: state
                    entity_id: !input ac_device
                    state: "off"
            sequence:
              - choose:
                  - conditions: "{{ ac_state == 'cool' }}"
                    sequence: !input cool_action
                  - conditions: "{{ ac_state == 'fan_only' }}"
                    sequence: !input fan_action
                  - conditions: "{{ ac_state == 'dry' }}"
                    sequence: !input dry_action
                  - conditions: "{{ ac_state == 'heat' }}"
                    sequence: !input heat_action

    # 2. Executa a Ação Padrão se as condições adicionais falharem
    else:
      - sequence: !input default_action
