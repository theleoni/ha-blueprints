blueprint:
  domain: automation
  homeassistant:
    min_version: 2025.7.0
  author: Guilherme C. Leoni (https://github.com/theleoni)
  source_url: https://www.github.com/theleoni/ha-blueprints

  name: "Automation based in Occupancy"
  description: |
    ⚠️ IMPORTANTE: Esta automação funciona apenas com o padrão de Ocupação de Cômodo V2: 'Vazio' | 'Passagem' | 'Ocupado' | 'Ocioso'.

    O Seletor de Ocupação trabalha em conjunto com a Entidade de Modo da Casa. O Modo da Casa tem precedência.

    Mapeamento Direto dos Modos da Casa:
      - "Ninguém em Casa" > Aciona ações de "Vazio"
      - "Apenas Pets na Casa" > Aciona ações de "Pet"
      - "Não perturbe" > Aciona ações de "Não perturbe"
      - "Dia a Dia" > Segue o sensor de ocupação do cômodo (Passagem, Ocupado, Ocioso)

    Modos adicionais ("Férias", "Dormindo", "Faxina", "Visitas", "Cinema") possuem seções individuais de ações, permitindo definir comportamentos independentes e validar condições extras (ex: luminosidade ou janelas).

  #######              INPUT              #######
  input:
    # --- 1. SELETORES PRINCIPAIS ---
    base:
      name: "Seletores Principais"
      collapsed: false
      icon: mdi:tune
      input:
        house_mode_entity:
          name: "Entidade do Modo da Casa"
          description: "O input_select que gerencia o estado geral da casa."
          default: input_select.house_mode
          selector:
            entity:
              filter:
                domain: input_select

        occupancy_selector:
          name: "Occupancy Seletor do Cômodo"
          description: "O input_select que gerencia o estado deste cômodo específico."
          selector:
            entity:
              filter:
                domain: input_select

        debounce_leave_empty:
          name: "Debounce - 'Vazio' > Outro estado"
          description: "Tempo de espera quando sai de 'Vazio' para qualquer outro estado."
          default: { hours: 0, minutes: 0, seconds: 0 }
          selector: { duration: { enable_day: false } }

        debounce_enter_empty:
          name: "Debounce - Outro estado > 'Vazio'"
          description: "Tempo de espera quando sai de qualquer estado para 'Vazio'."
          default: { hours: 0, minutes: 0, seconds: 0 }
          selector: { duration: { enable_day: false } }

        debounce_any_other:
          name: "Debounce - Entre outros estados"
          description: "Tempo de espera para mudanças que NÃO envolvem o estado 'Vazio' (ex: Passagem para Ocupado)."
          default: { hours: 0, minutes: 0, seconds: 0 }
          selector: { duration: { enable_day: false } }

    # --- 2. GATILHOS E CONDIÇÕES ADICIONAIS ---
    additional_data:
      name: "Gatilhos e Condições Adicionais"
      description: "Refine o acionamento e a execução da automação com regras extras."
      collapsed: false
      icon: mdi:filter-plus-outline
      input:
        additional_triggers:
          name: "Gatilhos Adicionais (Triggers)"
          description: "Outros eventos que também devem acionar esta automação (ex: mudança em sensor de luz)."
          default: []
          selector:
            trigger: {}
        additional_condition:
          name: "Condições Adicionais (Conditions)"
          description: "Condições extras que precisam ser validadas para executar as ações principais. ⚠️ Se falsas, executa a 'Ação Padrão'."
          default: []
          selector:
            condition: {}
        default_action:
          name: "Ação Padrão (Default)"
          description: "Executada quando as Condições Adicionais falharem para o estado atual."
          default: []
          selector: { action: {} }

    # --- 3. NÃO PERTURBE ---
    action_ignore_section:
      name: "Ações: Não perturbe"
      description: "O que fazer quando a casa estiver em 'Não perturbe'."
      collapsed: false
      icon: mdi:minus-circle
      input:
        base_action_ignore:
          name: "Ações"
          default: []
          selector: { action: {} }
        cond_ignore_bool:
          name: "Validar Condição Adicional?"
          default: true
          selector: { boolean: {} }

    # --- 4. VAZIO ---
    state_empty_actions:
      name: "Ações: Vazio"
      description: "Ações de desligamento/espera (Vazio)."
      collapsed: false
      icon: mdi:home-outline
      input:
        base_action_empty:
          name: "Ações quando Vazio"
          default: []
          selector: { action: {} }
        cond_empty_bool:
          name: "Validar Condição Adicional (Vazio)?"
          default: true
          selector: { boolean: {} }

    # --- 5. FÉRIAS ---
    house_mode_vacation_section:
      name: "Modo da Casa: Férias"
      collapsed: false
      icon: mdi:airplane
      input:
        action_vacation:
          name: "Ações quando Férias"
          default: []
          selector: { action: {} }
        cond_vacation_bool:
          name: "Validar Condição Adicional?"
          description: "Se desativado, ignora as 'Condições Adicionais' e executa a ação forçadamente."
          default: true
          selector: { boolean: {} }

    # --- 6. DIA A DIA (OCUPAÇÃO) ---
    everyday_occupancy_section:
      name: "Ações: Dia a Dia (Ocupação)"
      description: "Ações para o fluxo normal do cômodo (Passagem, Ocupado e Ocioso)."
      collapsed: false
      icon: mdi:account-check
      input:
        base_action_short_in:
          name: "Ações: Passagem"
          default: []
          selector: { action: {} }
        cond_short_in_bool:
          name: "Validar Condição Adicional (Passagem)?"
          default: true
          selector: { boolean: {} }

        base_action_long:
          name: "Ações: Ocupado"
          default: []
          selector: { action: {} }
        cond_long_bool:
          name: "Validar Condição Adicional (Ocupado)?"
          default: true
          selector: { boolean: {} }

        base_action_short_out:
          name: "Ações: Ocioso"
          default: []
          selector: { action: {} }
        cond_short_out_bool:
          name: "Validar Condição Adicional (Ocioso)?"
          default: true
          selector: { boolean: {} }

    # --- 7. DORMINDO ---
    house_mode_sleeping_section:
      name: "Modo da Casa: Dormindo"
      collapsed: false
      icon: mdi:sleep
      input:
        action_sleeping:
          name: "Ações quando Dormindo"
          default: []
          selector: { action: {} }
        cond_sleeping_bool:
          name: "Validar Condição Adicional?"
          description: "Se desativado, ignora as 'Condições Adicionais' e executa a ação forçadamente."
          default: true
          selector: { boolean: {} }

    # --- 8. PET ---
    action_pet_section:
      name: "Ações: Pet"
      description: "O que fazer quando apenas os pets estiverem na casa."
      collapsed: false
      icon: mdi:paw
      input:
        base_action_pet:
          name: "Ações"
          default: []
          selector: { action: {} }
        cond_pet_bool:
          name: "Validar Condição Adicional?"
          default: true
          selector: { boolean: {} }

    # --- 9. FAXINA ---
    house_mode_cleanning_section:
      name: "Modo da Casa: Faxina"
      collapsed: false
      icon: mdi:broom
      input:
        action_cleanning:
          name: "Ações quando Faxina"
          default: []
          selector: { action: {} }
        cond_cleanning_bool:
          name: "Validar Condição Adicional?"
          description: "Se desativado, ignora as 'Condições Adicionais' e executa a ação forçadamente."
          default: true
          selector: { boolean: {} }

    # --- 10. VISITAS ---
    house_mode_guest_section:
      name: "Modo da Casa: Visitas"
      collapsed: false
      icon: mdi:account-group
      input:
        action_guest:
          name: "Ações quando Visitas"
          default: []
          selector: { action: {} }
        cond_guest_bool:
          name: "Validar Condição Adicional?"
          description: "Se desativado, ignora as 'Condições Adicionais' e executa a ação forçadamente."
          default: true
          selector: { boolean: {} }

    # --- 11. CINEMA ---
    house_mode_cinema_section:
      name: "Modo da Casa: Cinema"
      collapsed: false
      icon: mdi:popcorn
      input:
        action_cinema:
          name: "Ações quando Cinema"
          default: []
          selector: { action: {} }
        cond_cinema_bool:
          name: "Validar Condição Adicional?"
          description: "Se desativado, ignora as 'Condições Adicionais' e executa a ação forçadamente."
          default: true
          selector: { boolean: {} }

#######         RUNNING CONFIG          #######
mode: queued

#######             VARIABLES           #######
variables:
  now_id: "{{ now().strftime('%H%M%S') }}"
  occupancy_selector_var: !input occupancy_selector
  house_mode_entity_var: !input house_mode_entity

  # 1. Captura os estados atuais das duas entidades
  current_house_mode: "{{ states(house_mode_entity_var) }}"
  current_occupancy: "{{ states(occupancy_selector_var) }}"

  # 2. Lógica central: Qual é o "Estado Efetivo" da automação agora?
  effective_state: >
    {% if current_house_mode == 'Ninguém em Casa' %} Vazio
    {% elif current_house_mode == 'Apenas Pets na Casa' %} Pet
    {% elif current_house_mode == 'Não perturbe' %} Não perturbe
    {% elif current_house_mode in ['Férias', 'Faxina', 'Visitas', 'Cinema', 'Dormindo'] %} {{ current_house_mode }}
    {% else %} {{ current_occupancy }} {% endif %}

  # 3. Captura as opções de validação condicional de TODOS os estados
  cond_vacation: !input cond_vacation_bool
  cond_cleaning: !input cond_cleanning_bool
  cond_guest: !input cond_guest_bool
  cond_cinema: !input cond_cinema_bool
  cond_sleeping: !input cond_sleeping_bool
  cond_empty: !input cond_empty_bool
  cond_short_in: !input cond_short_in_bool
  cond_long: !input cond_long_bool
  cond_short_out: !input cond_short_out_bool
  cond_pet: !input cond_pet_bool
  cond_ignore: !input cond_ignore_bool

  # 4. Lógica: A automação deve validar as "Condições Adicionais" para o estado atual?
  evaluate_conditions: >
    {% if effective_state == 'Férias' %} {{ cond_vacation | lower }}
    {% elif effective_state == 'Faxina' %} {{ cond_cleaning | lower }}
    {% elif effective_state == 'Visitas' %} {{ cond_guest | lower }}
    {% elif effective_state == 'Cinema' %} {{ cond_cinema | lower }}
    {% elif effective_state == 'Dormindo' %} {{ cond_sleeping | lower }}
    {% elif effective_state == 'Vazio' %} {{ cond_empty | lower }}
    {% elif effective_state == 'Passagem' %} {{ cond_short_in | lower }}
    {% elif effective_state == 'Ocupado' %} {{ cond_long | lower }}
    {% elif effective_state == 'Ocioso' %} {{ cond_short_out | lower }}
    {% elif effective_state == 'Pet' %} {{ cond_pet | lower }}
    {% elif effective_state == 'Não perturbe' %} {{ cond_ignore | lower }}
    {% else %} true {% endif %}

  # 5. Tratamento das variáveis de ação dos Modos da Casa
  action_vacation_var: !input action_vacation
  actions_vacation: >
    {% if action_vacation_var is mapping %} {{ [action_vacation_var] }}
    {% elif action_vacation_var is iterable and action_vacation_var is not string %} {{ action_vacation_var }}
    {% else %} [] {% endif %}

  action_cleanning_var: !input action_cleanning
  actions_cleanning: >
    {% if action_cleanning_var is mapping %} {{ [action_cleanning_var] }}
    {% elif action_cleanning_var is iterable and action_cleanning_var is not string %} {{ action_cleanning_var }}
    {% else %} [] {% endif %}

  action_guest_var: !input action_guest
  actions_guest: >
    {% if action_guest_var is mapping %} {{ [action_guest_var] }}
    {% elif action_guest_var is iterable and action_guest_var is not string %} {{ action_guest_var }}
    {% else %} [] {% endif %}

  action_cinema_var: !input action_cinema
  actions_cinema: >
    {% if action_cinema_var is mapping %} {{ [action_cinema_var] }}
    {% elif action_cinema_var is iterable and action_cinema_var is not string %} {{ action_cinema_var }}
    {% else %} [] {% endif %}

  action_sleeping_var: !input action_sleeping
  actions_sleeping: >
    {% if action_sleeping_var is mapping %} {{ [action_sleeping_var] }}
    {% elif action_sleeping_var is iterable and action_sleeping_var is not string %} {{ action_sleeping_var }}
    {% else %} [] {% endif %}

  # 6. Tratamento das variáveis de ação da Ocupação Padrão
  base_action_empty_var: !input base_action_empty
  actions_empty: >
    {% if base_action_empty_var is mapping %} {{ [base_action_empty_var] }}
    {% elif base_action_empty_var is iterable and base_action_empty_var is not string %} {{ base_action_empty_var }}
    {% else %} [] {% endif %}

  base_action_short_in_var: !input base_action_short_in
  actions_short_in: >
    {% if base_action_short_in_var is mapping %} {{ [base_action_short_in_var] }}
    {% elif base_action_short_in_var is iterable and base_action_short_in_var is not string %} {{ base_action_short_in_var }}
    {% else %} [] {% endif %}

  base_action_long_var: !input base_action_long
  actions_long: >
    {% if base_action_long_var is mapping %} {{ [base_action_long_var] }}
    {% elif base_action_long_var is iterable and base_action_long_var is not string %} {{ base_action_long_var }}
    {% else %} [] {% endif %}

  base_action_short_out_var: !input base_action_short_out
  actions_short_out: >
    {% if base_action_short_out_var is mapping %} {{ [base_action_short_out_var] }}
    {% elif base_action_short_out_var is iterable and base_action_short_out_var is not string %} {{ base_action_short_out_var }}
    {% else %} [] {% endif %}

  base_action_pet_var: !input base_action_pet
  actions_pet: >
    {% if base_action_pet_var is mapping %} {{ [base_action_pet_var] }}
    {% elif base_action_pet_var is iterable and base_action_pet_var is not string %} {{ base_action_pet_var }}
    {% else %} [] {% endif %}

  base_action_ignore_var: !input base_action_ignore
  actions_ignore: >
    {% if base_action_ignore_var is mapping %} {{ [base_action_ignore_var] }}
    {% elif base_action_ignore_var is iterable and base_action_ignore_var is not string %} {{ base_action_ignore_var }}
    {% else %} [] {% endif %}

#######             TRIGGERS            #######
triggers:
  - triggers: !input additional_triggers

  - trigger: state
    entity_id: input_boolean.runallautomation

  - trigger: state
    entity_id: !input house_mode_entity

  - trigger: state
    entity_id: !input occupancy_selector
    from: "Vazio"
    for: !input debounce_leave_empty

  - trigger: state
    entity_id: !input occupancy_selector
    to: "Vazio"
    for: !input debounce_enter_empty

  - trigger: state
    entity_id: !input occupancy_selector
    from:
      - "Passagem"
      - "Ocioso"
      - "Ocupado"
    to:
      - "Passagem"
      - "Ocioso"
      - "Ocupado"
    for: !input debounce_any_other

#######            CONDITIONS           #######
conditions:
  - condition: state
    entity_id: input_boolean.stopallautomation
    state: "off"

#######              ACTIONS            #######
actions:
  - choose:
      # --- 1. MODOS DA CASA ---
      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Férias' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_vacation | length > 0 }}"
                    sequence: !input action_vacation
            else:
              - sequence: !input default_action

      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Faxina' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_cleanning | length > 0 }}"
                    sequence: !input action_cleanning
            else:
              - sequence: !input default_action

      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Visitas' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_guest | length > 0 }}"
                    sequence: !input action_guest
            else:
              - sequence: !input default_action

      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Cinema' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_cinema | length > 0 }}"
                    sequence: !input action_cinema
            else:
              - sequence: !input default_action
              
      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Dormindo' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_sleeping | length > 0 }}"
                    sequence: !input action_sleeping
            else:
              - sequence: !input default_action

      # --- 2. ESTADOS DE OCUPAÇÃO PADRÃO E ESPECIAIS ---
      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Vazio' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_empty | length > 0 }}"
                    sequence: !input base_action_empty
            else:
              - sequence: !input default_action

      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Passagem' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_short_in | length > 0 }}"
                    sequence: !input base_action_short_in
            else:
              - sequence: !input default_action

      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Ocupado' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_long | length > 0 }}"
                    sequence: !input base_action_long
            else:
              - sequence: !input default_action

      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Ocioso' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_short_out | length > 0 }}"
                    sequence: !input base_action_short_out
            else:
              - sequence: !input default_action

      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Pet' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_pet | length > 0 }}"
                    sequence: !input base_action_pet
            else:
              - sequence: !input default_action

      - conditions:
          - condition: template
            value_template: "{{ effective_state == 'Não perturbe' }}"
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: template
                    value_template: "{{ evaluate_conditions == 'false' }}"
                  - condition: and
                    conditions: !input additional_condition
            then:
              - choose:
                  - conditions: "{{ actions_ignore | length > 0 }}"
                    sequence: !input base_action_ignore
            else:
              - sequence: !input default_action

    # --- 3. CATCH-ALL ---
    default:
      - sequence: !input default_action